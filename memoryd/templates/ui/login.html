<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>memoryd login</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(160deg, #f5efe1, #dff2ee);
      color: #1f1b16;
    }

    form {
      width: min(420px, calc(100vw - 2rem));
      display: grid;
      gap: 1rem;
      padding: 1.4rem;
      border-radius: 18px;
      background: #fffdf8;
      border: 1px solid #d9cfbe;
      box-shadow: 0 10px 30px rgba(31, 27, 22, 0.08);
    }

    input, button {
      border-radius: 12px;
      border: 1px solid #d9cfbe;
      padding: 0.85rem 0.95rem;
      font: inherit;
    }

    button {
      background: #1f1b16;
      color: #fff;
      cursor: pointer;
    }

    .error {
      color: #7f1d1d;
    }
  </style>
</head>
<body>
  <form action="/ui/login" method="post">
    <div>
      <h1>memoryd</h1>
      <p>Enter the configured bearer token to open the HTML browser.</p>
    </div>
    {% match error %}
    {% when Some with (message) %}
    <p class="error">{{ message }}</p>
    {% when None %}
    {% endmatch %}
    <label for="token">Bearer token</label>
    <input id="token" name="token" type="password" autocomplete="current-password" required>
    <button type="submit">Open browser</button>
  </form>
</body>
</html>
