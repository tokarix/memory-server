when:
  - event: pull_request
  - event: push
    branch: main

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: tokarix
      POSTGRES_PASSWORD: password
      POSTGRES_DB: memory_server_test

steps:
  fmt:
    image: rust:1.94-slim
    commands:
      - rustup component add rustfmt
      - cargo fmt --check

  check:
    image: rust:1.94-slim
    environment:
      CARGO_TARGET_DIR: /tmp/target
    commands:
      - apt-get update && apt-get install -y g++
      - cargo check --all-features --all-targets
    depends_on:
      - fmt

  clippy:
    image: rust:1.94-slim
    environment:
      CARGO_TARGET_DIR: /tmp/target
    commands:
      - apt-get update && apt-get install -y g++
      - rustup component add clippy
      - cargo clippy --all-features --all-targets --no-deps -- -D clippy::pedantic -D warnings
    depends_on:
      - fmt

  test:
    image: rust:1.94-slim
    environment:
      CARGO_TARGET_DIR: /tmp/target
      DATABASE_URL: postgres://tokarix:password@postgres:5432/memory_server_test
    commands:
      - apt-get update && apt-get install -y g++ postgresql-client
      - |
        timeout 30s bash -c 'until pg_isready -h postgres -U tokarix -d memory_server_test; do echo "Waiting for postgres..."; sleep 1; done'
      - cargo test --all-features --all-targets
    depends_on:
      - check
      - clippy

  build:
    image: rust:1.94-slim
    environment:
      CARGO_TARGET_DIR: /tmp/target
    commands:
      - apt-get update && apt-get install -y g++
      - cargo build --all-features --all-targets
    depends_on:
      - test
